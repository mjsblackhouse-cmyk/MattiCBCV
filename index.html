<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matti Clements — Board CV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: rgb(245,246,248);
    color: rgb(44,44,42);
    font-size: 15px;
    line-height: 1.65;
  }

  .page {
    max-width: 860px;
    margin: 48px auto;
    background: #ffffff;
    box-shadow: 0 2px 24px rgba(0,0,0,0.10);
  }

  /* ── HEADER ─────────────────────────────────────── */
  .header {
    background: rgb(27,58,92);
    padding: 52px 56px 40px;
    color: white;
  }
  .header h1 {
    font-family: 'Arial', sans-serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ffffff;
    margin-bottom: 8px;
  }
  .header .credentials {
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    color: rgb(158,197,224);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .header .tagline {
    font-style: italic;
    font-size: 17px;
    color: rgb(212,232,245);
    line-height: 1.6;
    max-width: 640px;
    border-left: 3px solid rgb(26,122,110);
    padding-left: 18px;
    margin-bottom: 12px;
  }
  .header .board-positioning {
    font-size: 14px;
    color: rgb(200,220,238);
    max-width: 640px;
    line-height: 1.6;
  }

  /* ── CONTACT BAR ─────────────────────────────────── */
  .contact-bar {
    background: rgb(26,122,110);
    padding: 12px 56px;
    display: flex;
    gap: 32px;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    color: rgb(200,237,232);
    flex-wrap: wrap;
  }
  .contact-bar span { opacity: 0.9; }
  .contact-bar a {
    color: rgb(200,237,232);
    text-decoration: none;
  }

  /* ── BODY ────────────────────────────────────────── */
  .body { padding: 48px 56px; }

  /* ── POSITIONING ─────────────────────────────────── */
  .positioning {
    background: rgb(240,246,250);
    border-left: 4px solid rgb(27,58,92);
    padding: 20px 24px;
    margin-bottom: 40px;
    border-radius: 0 6px 6px 0;
  }
  .positioning p {
    font-size: 15px;
    color: rgb(46,78,107);
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .positioning p:last-child { margin-bottom: 0; }
  .positioning .key-line {
    font-weight: bold;
    color: rgb(27,58,92);
  }

  /* ── SECTION HEADING ─────────────────────────────── */
  .section { margin-bottom: 40px; }
  .section-title {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgb(26,122,110);
    margin-bottom: 6px;
  }
  .section-rule {
    border: none;
    border-bottom: 2px solid rgb(26,122,110);
    margin-bottom: 20px;
  }

  /* ── VALUE PROPOSITION CARDS ──────────────────────── */
  .value-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 4px;
  }
  .value-card {
    background: rgb(240,244,248);
    border-top: 3px solid rgb(27,58,92);
    padding: 18px 20px;
    border-radius: 0 0 6px 6px;
  }
  .value-card h4 {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: rgb(27,58,92);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .value-card p {
    font-size: 13px;
    color: rgb(68,68,65);
    line-height: 1.55;
  }

  /* ── BOARD TABLE ──────────────────────────────────── */
  .board-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .board-table thead tr {
    background: rgb(27,58,92);
    color: white;
  }
  .board-table thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
